<!doctype html>
<html lang="ko">
  <head><meta charset="utf-8" /><title>лЎңк·ёмқё мІҳлҰ¬ мӨ‘вҖҰ</title></head>
  <body>
    <script>
      // OAuth ліөк·Җ м§Җм җ. мҷ„лЈҢ мӢ нҳёлҘј BroadcastChannelкіј opener postMessageлЎң мқҙмӨ‘ мҶЎмӢ н•ңлӢӨ вҖ”
      // Google кІҪмң  мӨ‘ COOPлЎң openerк°Җ лҒҠкёё мҲҳ мһҲм–ҙ м–ҙлҠҗ н•ңмӘҪл§ҢмңјлЎңлҠ” л¶ҖмЎұн•ҳлӢӨ.
      var error = new URLSearchParams(location.search).get('error');
      var payload = { type: 'auth:complete', error: error };
      if (typeof BroadcastChannel !== 'undefined') {
        var channel = new BroadcastChannel('ymc-auth');
        channel.postMessage(payload);
        channel.close();
      }
      if (window.opener) {
        window.opener.postMessage(payload, location.origin);
      }
      window.close();
      // closeк°Җ л¬ҙмӢңлҗҳлҠ” кІҪмҡ°(м „мІҙ лҰ¬лӢӨмқҙл үнҠё нҸҙл°ұ л“ұ) м•ұмңјлЎң ліөк·Җ
      setTimeout(function () {
        location.replace(error ? '/?error=' + encodeURIComponent(error) : '/');
      }, 150);
    </script>
  </body>
</html>
