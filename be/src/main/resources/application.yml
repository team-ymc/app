# ================= 공통 (모든 프로파일) =================
spring:
  application:
    name: ymc-api
  profiles:
    default: local          # 프로파일 미지정 시 local
  jackson:
    deserialization:
      # 계약(additionalProperties: false)에 없는 필드를 조용히 무시하지 않는다 —
      # FE 오타(sessoinId 등)가 새 세션을 만드는 사고 방지. 실패는 400 VALIDATION_ERROR로 변환된다.
      fail-on-unknown-properties: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update      # prod에서 validate로 덮음
    properties:
      hibernate:
        format_sql: true
  # FT-001 Google OAuth (YMC-227에서 콘솔 등록 완료 — 실값은 환경변수로).
  # redirect-uri의 baseUrl은 요청 Host 기준 → vite proxy(5173) 경유 시 5173으로 생성돼
  # 콘솔에 등록된 http://localhost:5173/api/login/oauth2/code/google 과 일치한다.
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy-client-secret}
            scope: [openid, email, profile]
            redirect-uri: "{baseUrl}/api/login/oauth2/code/{registrationId}"

# FT-001 인증. 만료값은 UX 파라미터 — 설계 §2 (30m/14d).
auth:
  jwt-secret: ${AUTH_JWT_SECRET:local-dev-only-secret-key-32bytes-min!!}   # HS256, 32바이트 이상
  access-ttl: 30m
  refresh-ttl: 14d
  fe-origin: http://localhost:5173
  cookie-secure: false

# FT-007 채팅 — AI 서버 연동과 스트림 타이머 (설계 §4)
ai:
  base-url: http://localhost:8000   # 로컬 AI 서버(uvicorn). prod는 내부망 주소로 덮는다
  fake-stream: false                # true면 고정 delta fake 어댑터 (자동화 테스트용)

chat:
  stream:
    idle-timeout: 60s               # AI 이벤트 사이 침묵 상한 — 행(hang) 감지
    deadline: 10m                   # 총 시한 안전망 — 워치독. 인프라 timeout보다 짧게 (ADR-004)
    heartbeat-interval: 15s         # FE 방향 침묵 시 heartbeat (계약 고정값 — 바꾸면 계약 위반)
    max-content-length: 65536       # delta 누적 상한 (문자 수). 초과 시 AI_RESPONSE_TOO_LARGE
    emitter-timeout: 11m            # MVC async timeout — deadline보다 커야 워치독이 먼저 발화

# AWS 리소스 이름 — 환경 무관 공통. 차이는 endpoint/credentials 뿐.
aws:
  region: ap-northeast-2
  s3:
    bucket: ymc-documents
    presign-expiry: 10m       # presigned PUT URL 유효 기간
  sqs:
    parse-request-queue: parse-requests
    parse-result-queue: parse-results

---
# ================= local (LocalStack + PostgreSQL) =================
# DB는 infra/local/docker-compose.yml의 postgres 서비스. 로컬도 운영과 같은 PG를 쓴다.
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ymc}
    username: ${DB_USERNAME:ymc}
    password: ${DB_PASSWORD:ymc}
    driver-class-name: org.postgresql.Driver

aws:
  # localhost.localstack.cloud = 항상 127.0.0.1로 풀리는 LocalStack 공식 도메인.
  # 네이티브(bootRun)·컨테이너(compose alias)·브라우저(presigned URL) 모두 이 이름 하나로 통일
  endpoint: http://localhost.localstack.cloud:4566
  credentials:
    access-key: test                # LocalStack은 아무 값이나 허용
    secret-key: test

---
# ================= prod (실 AWS + PostgreSQL) =================
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate            # 운영은 스키마 자동변경 금지

aws:
  endpoint:                         # 미지정 → 실제 AWS 엔드포인트
  # credentials 미지정 → IAM 역할로 자동 획득 (키 하드코딩 안 함)

auth:
  jwt-secret: ${AUTH_JWT_SECRET}    # prod는 기본값 없음 — 미설정 시 기동 실패가 맞다
  fe-origin: ${FE_ORIGIN}
  cookie-secure: true
