name: Manchu Chat

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  chat:
    if: contains(github.event.comment.body, '@만추')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@만추"
          claude_args: |
            --max-turns 20
            --append-system-prompt "응답은 한국어로 작성한다. 리뷰 재확인 요청('수정했어, 다시 봐줘')을 받으면 해당 지점의 현재 코드를 실제로 읽어 수정이 반영됐는지 검증한 뒤 답한다. 등급 표기는 P1(머지 전 수정 필수)/P2(권장)/P3(사소)를 사용한다."
